name: Calidad y cobertura

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-analyze:
    name: Pruebas y SonarQube Cloud
    runs-on: ubuntu-latest

    steps:
      - name: Obtener repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependencias
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Ejecutar pruebas con cobertura
        run: |
          coverage run -m unittest discover -s tests -p "test_*.py"
          coverage report
          coverage xml

      - name: Analizar con SonarQube Cloud
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
