name: Deploy Infrastructure and API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r src/requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"

  terraform:
    name: Terraform Deployment
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="api_key=${{ secrets.TFG_API_KEY }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="api_key=${{ secrets.TFG_API_KEY }}"

  deploy-api:
    name: Deploy Flask API
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-tfg-incidencias-dev
          package: src
